<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI,SW 전문강사 꿈만아</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0284c7" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" onerror="if(!sessionStorage.getItem('reloaded')){sessionStorage.setItem('reloaded','true');window.location.reload(true);}"></script>
    <script>
      // Unregister old service workers to fix the blank screen issue caused by stale caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
        
        // Register the new service worker
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New update available, reload the page to get the new assets
                    window.location.reload();
                  }
                };
              }
            };
          });
        });
      }
    </script>
  </body>
</html>
